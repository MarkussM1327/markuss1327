<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
</head>
<body>
    <h1>Create a new account</h1>
    {% if error %}
        <h3 style="color: red;">{{ error }}</h3>
    {% endif %}
    <form action="{{ url_for('sign_up') }}" method="POST">
        <label for="username">Create a username</label><br>
        <input type="text" name="username" minlength="1" maxlength="16" required><br><br>
        <label for="password">Create a password</label><br>
        <input type="password" name="password" minlength="8" maxlength="12" required><br><br>
        <button type="submit">Create Account</button> <a href="{{ url_for('login') }}"><button type="button">Back to Login</button></a>
    </form>
</body>
</html>
