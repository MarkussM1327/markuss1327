<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <title>Login</title>
</head>
<body>
<div class="auth-shell">
    <header class="auth-header">
        <h1>Login</h1>
        <p>Access your TrailGames profile and compare your best times.</p>
    </header>
    {% if session.get("login_error") %}
    <div class="form-alert">{{ session.get("login_error") }}</div>
    {% endif %}
    <form action="{{ url_for('login') }}" method="POST" class="auth-form">
        <label for="username">Username</label>
        <input type="text" name="username" maxlength="12" required>
        <label for="password">Password</label>
        <input type="password" name="password" maxlength="8" required>
        <div class="form-actions">
            <button type="submit" class="primary-btn">Login</button>
            <a href="{{ url_for('sign_up') }}" class="link-button">Sign up</a>
        </div>
        <div class="secondary-actions">
            <a href="{{ url_for('index') }}">Back Home</a>
        </div>
    </form>
</div>
</body>
</html>
